name: Build CISK Spawn Mod

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build mod jar
        run: ./gradlew --no-daemon build --stacktrace

      - name: List build output
        if: always()
        run: ls -la build/libs/ || echo "no build/libs/"

      - name: Upload mod jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ciskspawn-mod-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 90

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            build/reports/
            build/tmp/neoformruntime/*/console_output.txt
          retention-days: 14
          if-no-files-found: ignore
